<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BerlinWalk Free Tools Homepage</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    html,
    body {
      background: var(--cream);
    }

    #bw-tools-home {
      --serif: Merriweather, Georgia, serif;
      background: var(--cream);
      color: var(--text);
      font-family: Montserrat, Arial, sans-serif;
      margin: 0;
      max-width: 100%;
      overflow-x: hidden;
      padding: 48px 24px;
    }

    #bw-tools-home * {
      box-sizing: border-box;
    }

    #bw-tools-home h2,
    #bw-tools-home h3,
    #bw-tools-home p {
      margin-top: 0;
    }

    #bw-tools-home .tools-home-inner {
      margin: 0 auto;
      max-width: 1120px;
    }

    #bw-tools-home .tools-home-header {
      margin: 0 auto 26px;
      max-width: 760px;
      text-align: center;
    }

    #bw-tools-home .tools-home-kicker {
      color: var(--brand-green);
      display: block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1.2;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    #bw-tools-home .tools-home-title {
      color: var(--brand-green);
      font-size: 34px;
      font-weight: 800;
      line-height: 1.14;
      margin-bottom: 10px;
    }

    #bw-tools-home .tools-home-lead {
      color: var(--muted);
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 0;
      white-space: nowrap;
    }

    #bw-tools-home .loading,
    #bw-tools-home .error {
      color: var(--muted);
      font-family: var(--serif);
      font-size: 16px;
      padding: 12px 0;
      text-align: center;
    }

    #bw-tools-home .tools-grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    #bw-tools-home .tool-card {
      align-items: flex-start;
      background: var(--bw-white);
      border: 1px solid var(--light-green);
      border-radius: 12px;
      color: inherit;
      display: flex;
      flex-direction: row;
      gap: 16px;
      min-width: 0;
      padding: 18px 20px;
      text-align: left;
      text-decoration: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    #bw-tools-home .tool-card:hover,
    #bw-tools-home .tool-card:focus-visible {
      border-color: var(--brand-green);
      box-shadow: 0 10px 24px rgba(27, 94, 32, 0.12);
      transform: translateY(-2px);
    }

    #bw-tools-home .tool-card:focus-visible {
      outline: 3px solid rgba(255, 230, 0, 0.9);
      outline-offset: 2px;
    }

    #bw-tools-home .tool-card-thumb {
      border-radius: 8px;
      flex-shrink: 0;
      height: 80px;
      object-fit: cover;
      width: 80px;
    }

    #bw-tools-home .tool-card-placeholder {
      align-items: center;
      background: linear-gradient(135deg, var(--brand-yellow), var(--brand-lime));
      border-radius: 8px;
      color: var(--brand-green);
      display: flex;
      flex-shrink: 0;
      font-family: Montserrat, Arial, sans-serif;
      font-size: 32px;
      font-weight: 800;
      height: 80px;
      justify-content: center;
      line-height: 1;
      text-transform: uppercase;
      width: 80px;
    }

    #bw-tools-home .tool-card-content {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      min-width: 0;
    }

    #bw-tools-home .tool-card h3 {
      color: var(--brand-green);
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 8px;
      overflow-wrap: break-word;
    }

    #bw-tools-home .tool-card p {
      color: var(--text);
      font-family: var(--serif);
      font-size: 14.5px;
      line-height: 1.5;
      margin-bottom: 12px;
      overflow-wrap: break-word;
    }

    #bw-tools-home .tool-cta {
      color: var(--brand-green);
      display: inline-block;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.8px;
      margin-top: auto;
      text-transform: uppercase;
    }

    #bw-tools-home .tools-home-footer {
      margin-top: 24px;
      text-align: center;
    }

    #bw-tools-home .btn-primary {
      background: var(--brand-yellow);
      border-radius: 10px;
      color: var(--brand-green);
      display: inline-block;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.6px;
      padding: 14px 28px;
      text-decoration: none;
      text-transform: uppercase;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    #bw-tools-home .btn-primary:hover,
    #bw-tools-home .btn-primary:focus-visible {
      background: #fff04a;
      transform: translateY(-1px);
    }

    #bw-tools-home .btn-primary:focus-visible {
      outline: 3px solid rgba(27, 94, 32, 0.3);
      outline-offset: 3px;
    }

    @media (max-width: 1024px) {
      #bw-tools-home .tools-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #bw-tools-home .tools-home-lead {
        white-space: normal;
      }
    }

    @media (max-width: 520px) {
      #bw-tools-home {
        padding: 32px 16px;
      }

      #bw-tools-home .tools-home-header {
        margin-bottom: 22px;
      }

      #bw-tools-home .tools-home-title {
        font-size: 24px;
      }

      #bw-tools-home .tools-home-lead {
        font-size: 14px;
      }

      #bw-tools-home .tools-grid {
        grid-template-columns: 1fr;
      }

      #bw-tools-home .tool-card {
        gap: 12px;
        padding: 14px;
      }

      #bw-tools-home .tool-card-thumb,
      #bw-tools-home .tool-card-placeholder {
        height: 64px;
        width: 64px;
      }

      #bw-tools-home .tool-card-placeholder {
        font-size: 24px;
      }

      #bw-tools-home .tool-card h3 {
        font-size: 16px;
        margin-bottom: 6px;
      }

      #bw-tools-home .tool-card p {
        font-size: 13.5px;
        margin-bottom: 10px;
      }

      #bw-tools-home .btn-primary {
        display: block;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="bw-tools-home">
    <section class="tools-home-inner" aria-labelledby="tools-home-title">
      <header class="tools-home-header">
        <span class="tools-home-kicker">Free tools</span>
        <h2 id="tools-home-title" class="tools-home-title">Free Berlin Tools</h2>
        <p class="tools-home-lead">Quick calculators, maps, and guides built by a local guide.</p>
      </header>

      <div id="tools-root" class="loading" aria-live="polite">Loading tools...</div>

      <footer class="tools-home-footer">
        <a href="https://www.berlinwalk.com/berlin-tools" class="btn-primary" target="_top">See all tools →</a>
      </footer>
    </section>
  </div>

  <script>
    (function () {
      var root = document.getElementById('tools-root');
      var toolsBaseUrl = 'https://www.berlinwalk.com/tools/';
      var lastReported = 0;
      var pendingResize = false;

      function createTextElement(tag, className, text) {
        var element = document.createElement(tag);
        if (className) element.className = className;
        element.textContent = text;
        return element;
      }

      function contentHeight() {
        var body = document.body;
        if (!body || !body.children || !body.children.length) return 0;

        var max = 0;
        for (var i = 0; i < body.children.length; i++) {
          var child = body.children[i];
          var rect = child.getBoundingClientRect();
          var cs = window.getComputedStyle ? window.getComputedStyle(child) : null;
          var marginBottom = cs ? (parseFloat(cs.marginBottom) || 0) : 0;
          var bottom = rect.bottom + marginBottom;
          if (bottom > max) max = bottom;
        }

        return Math.ceil(max);
      }

      function reportResize() {
        var height = contentHeight();
        if (height <= 0 || Math.abs(height - lastReported) <= 2) return;

        lastReported = height;
        try {
          window.parent.postMessage({ type: 'bw-resize', height: height }, '*');
        } catch (error) {
          /* Parent is unreachable, so there is nothing to resize. */
        }
      }

      function requestResize() {
        if (pendingResize) return;
        pendingResize = true;
        (window.requestAnimationFrame || function (callback) { setTimeout(callback, 16); })(function () {
          pendingResize = false;
          reportResize();
        });
      }

      function navigateParent(event) {
        var link = event.target.closest('a[href^="https://www.berlinwalk.com/"]');
        if (!link || event.defaultPrevented || event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;

        event.preventDefault();

        try {
          window.top.location.href = link.href;
        } catch (error) {
          window.open(link.href, '_blank', 'noopener');
        }
      }

      function renderTools(data) {
        var fragment = document.createDocumentFragment();
        var grid = document.createElement('div');
        grid.className = 'tools-grid';

        data.featuredTools.slice(0, 6).forEach(function (tool) {
          var card = document.createElement('a');
          card.className = 'tool-card';
          card.href = toolsBaseUrl + tool.slug;
          card.target = '_top';

          var image = tool.image && typeof tool.image === 'string' ? tool.image.trim() : '';
          if (image) {
            var img = document.createElement('img');
            img.className = 'tool-card-thumb';
            img.src = image;
            img.alt = tool.title;
            img.loading = 'lazy';
            img.decoding = 'async';
            card.appendChild(img);
          } else {
            var placeholder = document.createElement('div');
            placeholder.className = 'tool-card-placeholder';
            placeholder.setAttribute('aria-hidden', 'true');
            placeholder.textContent = (tool.title || '').charAt(0);
            card.appendChild(placeholder);
          }

          var content = document.createElement('div');
          content.className = 'tool-card-content';
          content.appendChild(createTextElement('h3', '', tool.title));
          content.appendChild(createTextElement('p', '', tool.lead));
          content.appendChild(createTextElement('span', 'tool-cta', 'Open tool →'));
          card.appendChild(content);

          grid.appendChild(card);
        });

        fragment.appendChild(grid);
        root.className = '';
        root.replaceChildren(fragment);
        requestResize();
      }

      function renderError() {
        root.className = 'error';
        root.textContent = 'Tools could not be loaded. Please refresh the page.';
        requestResize();
      }

      fetch('./data.json')
        .then(function (response) {
          if (!response.ok) throw new Error('Could not load tools');
          return response.json();
        })
        .then(renderTools)
        .catch(renderError);

      document.addEventListener('click', navigateParent);
      window.addEventListener('load', requestResize);

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(requestResize).catch(function () {});
      }

      if (typeof ResizeObserver !== 'undefined') {
        try { new ResizeObserver(requestResize).observe(document.body); } catch (error) {}
      }

      requestResize();
    })();
  </script>
</body>
</html>
