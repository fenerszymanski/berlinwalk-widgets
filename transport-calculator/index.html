<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Berlin Transport Ticket Calculator | BerlinWalk</title>
  <link rel="stylesheet" href="../css/brand.css">
</head>
<body>
<div style="font-family:'Montserrat',sans-serif;max-width:700px;margin:20px auto;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.08);">
  <div style="background:#1B5E20;padding:14px 20px;display:flex;align-items:center;gap:10px;">
    <span style="font-size:20px;">🧮</span>
    <span style="color:#FFE600;font-weight:800;font-size:15px;letter-spacing:0.5px;">TICKET CALCULATOR</span>
  </div>
  <div style="background:#FFFFFF;padding:24px;">
    <p style="font-size:14px;color:#555;margin:0 0 20px;">Find the cheapest option for your Berlin trip:</p>

    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
      <div style="flex:1;min-width:130px;">
        <label style="font-size:12px;font-weight:600;color:#1B5E20;display:block;margin-bottom:6px;">Days in Berlin</label>
        <input type="range" min="1" max="7" value="2" id="bw-days" style="width:100%;accent-color:#1B5E20;" oninput="bwCalc()">
        <span style="font-size:14px;font-weight:700;color:#212121;" id="bw-days-out">2</span>
      </div>
      <div style="flex:1;min-width:130px;">
        <label style="font-size:12px;font-weight:600;color:#1B5E20;display:block;margin-bottom:6px;">Rides per day</label>
        <input type="range" min="1" max="8" value="4" id="bw-rides" style="width:100%;accent-color:#1B5E20;" oninput="bwCalc()">
        <span style="font-size:14px;font-weight:700;color:#212121;" id="bw-rides-out">4</span>
      </div>
      <div style="flex:1;min-width:130px;">
        <label style="font-size:12px;font-weight:600;color:#1B5E20;display:block;margin-bottom:6px;">Travellers</label>
        <input type="range" min="1" max="5" value="1" id="bw-people" style="width:100%;accent-color:#1B5E20;" oninput="bwCalc()">
        <span style="font-size:14px;font-weight:700;color:#212121;" id="bw-people-out">1</span>
      </div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <button id="bw-ab" onclick="bwZone='AB';bwCalc();" style="flex:1;padding:10px;border:2px solid #1B5E20;background:#1B5E20;color:#FFE600;font-weight:700;font-size:13px;border-radius:8px;cursor:pointer;font-family:'Montserrat',sans-serif;">Zone AB — City</button>
      <button id="bw-abc" onclick="bwZone='ABC';bwCalc();" style="flex:1;padding:10px;border:2px solid #C5E1A5;background:#fff;color:#1B5E20;font-weight:700;font-size:13px;border-radius:8px;cursor:pointer;font-family:'Montserrat',sans-serif;">Zone ABC — + Airport</button>
    </div>

    <div id="bw-results"></div>

    <p style="font-size:11px;color:#999;margin:16px 0 0;">Prices as of January 2026 · Source: <a href="https://www.bvg.de/en/subscriptions-and-tickets/all-tickets" target="_blank" style="color:#7CB342;">BVG</a></p>
  </div>
</div>

<script>
var bwZone='AB';
function bwCalc(){
  var d=parseInt(document.getElementById('bw-days').value);
  var r=parseInt(document.getElementById('bw-rides').value);
  var p=parseInt(document.getElementById('bw-people').value);
  document.getElementById('bw-days-out').textContent=d;
  document.getElementById('bw-rides-out').textContent=r;
  document.getElementById('bw-people-out').textContent=p;
  var pr=bwZone==='AB'?{s:4,d:11.2,g:35.3,f:12.4}:{s:5,d:12.9,g:37.7,f:15.4};
  document.getElementById('bw-ab').style.background=bwZone==='AB'?'#1B5E20':'#fff';
  document.getElementById('bw-ab').style.color=bwZone==='AB'?'#FFE600':'#1B5E20';
  document.getElementById('bw-abc').style.background=bwZone==='ABC'?'#1B5E20':'#fff';
  document.getElementById('bw-abc').style.color=bwZone==='ABC'?'#FFE600':'#1B5E20';
  var tr=d*r;var opts=[];
  opts.push({n:'Single tickets',c:Math.round(tr*pr.s*p*100)/100,t:tr*p+' tickets @ €'+pr.s.toFixed(2)});
  var fp=Math.ceil((tr*p)/4);opts.push({n:'4-trip tickets',c:Math.round(fp*pr.f*100)/100,t:fp+' pack(s)'});
  opts.push({n:'24h ticket ('+d+' day'+(d>1?'s':'')+')',c:Math.round(d*pr.d*p*100)/100,t:'€'+pr.d.toFixed(2)+'/day × '+p});
  if(p>=2&&p<=5){opts.push({n:'Group day ticket',c:Math.round(d*pr.g*100)/100,t:'Up to 5 people'});}
  opts.sort(function(a,b){return a.c-b.c;});var best=opts[0].c;var h='';
  for(var i=0;i<opts.length;i++){var o=opts[i];var ib=o.c===best;
    h+='<div style="background:'+(ib?'#F8FBEF':'#FAFAFA')+';border:'+(ib?'2px solid #7CB342':'1px solid #E8E8E8')+';border-radius:10px;padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">';
    h+='<div>';if(ib)h+='<span style="font-size:10px;font-weight:800;color:#1B5E20;letter-spacing:1px;">✔ BEST VALUE</span><br>';
    h+='<span style="font-size:14px;font-weight:700;color:#212121;">'+o.n+'</span><br><span style="font-size:11px;color:#888;">'+o.t+'</span></div>';
    h+='<span style="font-size:20px;font-weight:800;color:#1B5E20;">€'+o.c.toFixed(2)+'</span></div>';}
  document.getElementById('bw-results').innerHTML=h;}
bwCalc();
</script>
</body>
</html>
