<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BerlinWalk Free Walking Tour | Book Your Free Spot</title>
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    body { background: transparent; padding: 0; margin: 0; }

    .bw-tourcta {
      max-width: 100%;
      margin: 32px auto;
      background: #1B5E20;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 1.5fr;
      box-sizing: border-box;
    }
    .bw-tourcta-image {
      background: url('https://static.wixstatic.com/media/5a08a3_4aee725fb5764dfb9f69f6485b9c8a36~mv2.jpeg') center/cover no-repeat;
      min-height: 260px;
    }
    .bw-tourcta-content {
      padding: 32px 30px 28px;
      color: #fff;
      text-align: left;
    }
    .bw-tourcta-kicker {
      color: #FFE600;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .bw-tourcta-headline {
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
      margin: 0 0 12px 0;
    }
    .bw-tourcta-sub {
      color: rgba(255,255,255,0.85);
      font-size: 14.5px;
      line-height: 1.6;
      margin: 0 0 20px;
    }
    .bw-tourcta-btn {
      display: inline-block;
      background: #FFE600;
      color: #1B5E20;
      font-weight: 800;
      font-size: 14.5px;
      padding: 14px 26px;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      transition: background 0.15s ease;
    }
    .bw-tourcta-btn:hover { background: #FFEF33; }
    .bw-tourcta-disclaimer {
      color: rgba(255,230,0,0.75);
      font-size: 11.5px;
      line-height: 1.5;
      margin: 0;
    }

    @media (max-width: 600px) {
      .bw-tourcta {
        grid-template-columns: 1fr;
        margin: 24px auto;
        border-radius: 10px;
      }
      .bw-tourcta-image { min-height: 160px; }
      .bw-tourcta-content { padding: 26px 22px 22px; text-align: center; }
      .bw-tourcta-headline { font-size: 19px; }
      .bw-tourcta-sub { font-size: 13.5px; }
      .bw-tourcta-btn { font-size: 14px; padding: 13px 22px; }
      .bw-tourcta-disclaimer { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="bw-tourcta">
    <div class="bw-tourcta-image" role="img" aria-label="Illustration of Berlin landmarks: TV Tower, Brandenburg Gate, Berlin Cathedral"></div>
    <div class="bw-tourcta-content">
      <div class="bw-tourcta-kicker">FREE WALKING TOUR · TIP-BASED</div>
      <h2 class="bw-tourcta-headline">Walk Berlin with a local</h2>
      <p class="bw-tourcta-sub">12 stops from Alexanderplatz to Hackescher Markt. ~2 hours of history, myths, and hidden details — explained on the spot, in English.</p>
      <a class="bw-tourcta-btn" href="https://www.berlinwalk.com/book-berlin-walking-tour/berlin-free-walking-tour-tip-based" target="_blank" rel="noopener">BOOK YOUR FREE SPOT →</a>
      <p class="bw-tourcta-disclaimer">No fixed price. Tip what you feel the tour was worth.</p>
    </div>
  </div>
</body>
</html>
