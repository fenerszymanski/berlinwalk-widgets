<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BerlinWalk Free Walking Tour | Book Your Free Spot</title>
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    body { background: transparent; padding: 0; margin: 0; }
    .bw-tourcta {
      max-width: 100%;
      margin: 32px auto;
      background: #1B5E20;
      border-radius: 12px;
      padding: 36px 32px 30px;
      text-align: center;
      color: #fff;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
      box-sizing: border-box;
    }
    .bw-tourcta-kicker {
      color: #FFE600;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .bw-tourcta-headline {
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
      margin: 0 0 14px 0;
    }
    .bw-tourcta-sub {
      color: rgba(255,255,255,0.85);
      font-size: 14.5px;
      line-height: 1.6;
      margin: 0 auto 22px;
      max-width: 560px;
    }
    .bw-tourcta-btn {
      display: inline-block;
      background: #FFE600;
      color: #1B5E20;
      font-weight: 800;
      font-size: 14.5px;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      transition: background 0.15s ease;
    }
    .bw-tourcta-btn:hover { background: #FFEF33; }
    .bw-tourcta-disclaimer {
      color: rgba(255,230,0,0.75);
      font-size: 11.5px;
      line-height: 1.5;
      margin: 0;
    }
    @media (max-width: 520px) {
      .bw-tourcta { padding: 28px 20px 24px; margin: 24px auto; border-radius: 10px; }
      .bw-tourcta-headline { font-size: 19px; }
      .bw-tourcta-sub { font-size: 13.5px; }
      .bw-tourcta-btn { font-size: 14px; padding: 13px 22px; }
      .bw-tourcta-disclaimer { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="bw-tourcta">
    <div class="bw-tourcta-kicker">FREE WALKING TOUR · TIP-BASED</div>
    <h2 class="bw-tourcta-headline">Hungry for more Berlin stories?</h2>
    <p class="bw-tourcta-sub">Join our free walking tour from Alexanderplatz to Hackescher Markt. History, myths, hidden stories — and tips on where to eat afterwards.</p>
    <a class="bw-tourcta-btn" href="https://www.berlinwalk.com/book-berlin-walking-tour/berlin-free-walking-tour-tip-based" target="_blank" rel="noopener">BOOK YOUR FREE SPOT →</a>
    <p class="bw-tourcta-disclaimer">No fixed price. Tip what you feel the tour was worth.</p>
  </div>
</body>
</html>
