name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build filtered Pages artifact
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='.playwright-cli/' \
            --exclude='blog-drafts/' \
            --exclude='node_modules/' \
            --exclude='output/' \
            ./ _site/
          mkdir -p _site/blog-drafts/images/berlin-ab-abc-ticket-zones/assets
          cp -R blog-drafts/images/berlin-ab-abc-ticket-zones/assets/optimized \
            _site/blog-drafts/images/berlin-ab-abc-ticket-zones/assets/
          touch _site/.nojekyll
          du -sh _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Wait for default Pages deployment to release environment
        run: sleep 240

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
