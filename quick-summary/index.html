<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BerlinWalk Quick Summary</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    body {
      font-family: Montserrat, Arial, sans-serif;
      color: #212121;
    }

    .bw-quick,
    .bw-quick * {
      box-sizing: border-box;
    }

    .bw-quick {
      --green: #1B5E20;
      --yellow: #FFE600;
      --cream: #F5F5F0;
      --border: #E5E5DD;
      --line: #DDDDD4;
      --lime: #C5E1A5;
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--cream);
    }

    .bw-quick-header {
      background: var(--green);
      padding: 15px 16px;
    }

    .bw-heading-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bw-icon {
      width: 44px;
      height: 44px;
      min-width: 44px;
      background: var(--yellow);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
    }

    .bw-title {
      margin: 0;
      color: #fff;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .bw-kicker {
      margin-top: 3px;
      color: var(--lime);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bw-audio {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.16);
    }

    .bw-audio.is-visible {
      display: block;
    }

    .bw-audio-label {
      margin: 0 0 9px;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.25;
    }

    .bw-audio audio {
      width: 100%;
      height: 40px;
      display: block;
    }

    .bw-list {
      padding: 7px 16px 5px;
    }

    .bw-item {
      display: flex;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
      align-items: flex-start;
    }

    .bw-item:last-child {
      border-bottom: 0;
    }

    .bw-number {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      background: var(--green);
      color: var(--yellow);
      font-size: 14px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .bw-text {
      color: #212121;
      font-size: 15px;
      line-height: 1.55;
    }

    .bw-text strong {
      color: var(--green);
      font-weight: 800;
    }

    .bw-footer {
      background: var(--green);
      padding: 11px 16px;
      display: flex;
      justify-content: flex-end;
    }

    .bw-badge {
      background: var(--yellow);
      color: var(--green);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .bw-empty {
      padding: 16px;
      color: #4E5A4E;
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .bw-quick {
        border-radius: 14px;
      }

      .bw-quick-header {
        padding: 13px 14px;
      }

      .bw-heading-row {
        gap: 10px;
      }

      .bw-icon {
        width: 38px;
        height: 38px;
        min-width: 38px;
        border-radius: 10px;
        font-size: 19px;
      }

      .bw-title {
        font-size: 16px;
      }

      .bw-kicker {
        font-size: 9.5px;
        letter-spacing: 0.8px;
      }

      .bw-audio {
        margin-top: 11px;
        padding-top: 11px;
      }

      .bw-audio-label {
        font-size: 13px;
        margin-bottom: 7px;
      }

      .bw-list {
        padding: 4px 14px;
      }

      .bw-item {
        gap: 10px;
        padding: 10px 0;
      }

      .bw-number {
        width: 25px;
        height: 25px;
        min-width: 25px;
        font-size: 12px;
      }

      .bw-text {
        font-size: 13.5px;
        line-height: 1.45;
      }

      .bw-footer {
        padding: 9px 14px;
      }

      .bw-badge {
        font-size: 11px;
        padding: 5px 12px;
      }
    }
  </style>
</head>
<body>
  <section class="bw-quick" aria-label="Quick summary">
    <div class="bw-quick-header">
      <div class="bw-heading-row">
        <div class="bw-icon" data-field="icon" aria-hidden="true">📝</div>
        <div>
          <h2 class="bw-title" data-field="title">Quick Summary</h2>
          <div class="bw-kicker" data-field="kicker">BERLINWALK.COM • TOURIST TIPS</div>
        </div>
      </div>

      <div class="bw-audio" data-field="audio-wrap">
        <p class="bw-audio-label" data-field="audio-label">Listen to the Quick Summary</p>
        <audio controls preload="none" data-field="audio">
          <source data-field="audio-source" src="" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
      </div>
    </div>

    <div class="bw-list" data-field="list"></div>

    <div class="bw-footer">
      <div class="bw-badge">berlinwalk.com</div>
    </div>
  </section>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var root = document.querySelector('.bw-quick');
      var list = document.querySelector('[data-field="list"]');
      var icon = document.querySelector('[data-field="icon"]');
      var title = document.querySelector('[data-field="title"]');
      var kicker = document.querySelector('[data-field="kicker"]');
      var audioWrap = document.querySelector('[data-field="audio-wrap"]');
      var audioSource = document.querySelector('[data-field="audio-source"]');
      var audio = document.querySelector('[data-field="audio"]');
      var audioLabel = document.querySelector('[data-field="audio-label"]');

      function value(name, fallback) {
        var raw = params.get(name);
        return raw && raw.trim() ? raw.trim() : fallback;
      }

      function escapeHtml(text) {
        return text.replace(/[&<>"']/g, function (char) {
          return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
          }[char];
        });
      }

      function formatSummary(text) {
        var escaped = escapeHtml(text);
        return escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      }

      icon.textContent = value('icon', '📝');
      title.textContent = value('title', 'Quick Summary');
      kicker.textContent = value('kicker', 'BERLINWALK.COM • TOURIST TIPS');
      audioLabel.textContent = value('audioLabel', 'Listen to the Quick Summary');

      var audioUrl = value('audio', '');
      if (audioUrl) {
        audioSource.src = audioUrl;
        audio.load();
        audioWrap.classList.add('is-visible');
      }

      var items = [];
      for (var i = 1; i <= 7; i += 1) {
        var item = value('i' + i, '');
        if (item) items.push(item);
      }

      if (!items.length) {
        root.innerHTML = '<div class="bw-empty">Add summary items with URL parameters such as <strong>i1</strong>, <strong>i2</strong>, and <strong>i3</strong>.</div>';
        return;
      }

      list.innerHTML = items.map(function (item, index) {
        return [
          '<div class="bw-item">',
          '<div class="bw-number">' + (index + 1) + '</div>',
          '<div class="bw-text">' + formatSummary(item) + '</div>',
          '</div>'
        ].join('');
      }).join('');
    })();
  </script>
</body>
</html>
