<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Can You Get Into Berghain? | BerlinWalk</title>
  <meta name="description" content="Test your Berlin clubbing instincts against the world's strictest door policy.">
  <link rel="icon" href="../tools-home/icons/berlin-bouncer-160.png">
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    :root {
      --bw-yellow: #FFFF00;
      --bw-green-dark: #0A1C10;
      --bw-white: #FFFFFF;
      --bw-error: #FF3333;
      --bw-lime: #CCFF00;
      --bw-text-muted: #A0AAB2;
    }
    
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    
    @keyframes pulse-red {
      0% { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0); }
      50% { box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.2); }
      100% { box-shadow: inset 0 0 50px rgba(255, 0, 0, 0); }
    }
    
    .shake {
      animation: shake 0.5s;
    }
    
    .club-lights {
      animation: pulse-red 2s infinite;
    }
    
    * {
      box-sizing: border-box;
      --bw-error: #E63946;
    }
    html, body {
      background: transparent;
      margin: 0 !important;
      padding: 0 !important;
      height: 100%;
      font-family: Montserrat, Arial, sans-serif;
    }
    #bw-bouncer-sim {
      background: var(--bw-green-dark);
      background-size: cover;
      background-position: center;
      transition: background-image 0.5s ease-in-out;
      color: var(--bw-white);
      margin: 0 !important;
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .bouncer-hero {
      background: linear-gradient(135deg, rgba(27, 94, 32, 0.8), rgba(18, 63, 22, 0.95)), url('assets/berghain_exterior.png');
      background-size: cover;
      background-position: center;
      padding: 40px 20px;
      text-align: center;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    .kicker {
      color: var(--bw-yellow);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 900;
      margin: 0 0 12px;
      line-height: 1.1;
    }
    .lead-text {
      color: var(--bw-text-muted);
      font-size: 16px;
      line-height: 1.5;
      max-width: 500px;
      margin: 0 auto 24px;
    }
    .btn-start {
      background: var(--bw-yellow);
      color: var(--bw-green-dark);
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 800;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-start:hover {
      transform: translateY(-2px);
      background: #FFF04D;
    }
    
    #game-container {
      display: none;
      flex-grow: 1;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 80%, transparent 100%);
    }
    
    /* Dialogue Box Style */
    .dialogue-box {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-left: 4px solid var(--bw-yellow);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(4px);
    }
    
    .question-title {
      font-size: 20px;
      font-weight: 700;
      margin: 0;
      color: var(--bw-white);
      line-height: 1.4;
      min-height: 56px;
    }
    
    .options-grid {
      display: grid;
      gap: 12px;
      width: 100%;
    }
    
    .options-grid.cards-view {
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .option-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--bw-white);
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    
    .option-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: var(--bw-yellow);
      transform: translateX(4px);
    }
    
    .card-btn {
      background: rgba(0,0,0,0.8);
      border: 2px solid transparent;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }
    
    .card-btn:hover {
      transform: scale(1.02);
      border-color: var(--bw-yellow);
    }
    
    .card-btn img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }
    
    .card-btn .card-label {
      padding: 12px;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      color: var(--bw-white);
    }
    
    .progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(0,0,0,0.5);
      z-index: 20;
      display: none;
    }
    .progress-fill {
      height: 100%;
      background: var(--bw-lime);
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .timer-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: rgba(0,0,0,0.8);
      z-index: 20;
      display: none;
    }
    .timer-fill {
      height: 100%;
      background: var(--bw-error);
      width: 100%;
      transition: width linear;
    }
    
    #countdown-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 140px;
      font-weight: 900;
      color: rgba(255, 51, 51, 0.3);
      z-index: 5;
      display: none;
      pointer-events: none;
      text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
    }
    
    #result-container {
      display: none;
      text-align: center;
      padding: 40px 20px;
      background: rgba(0,0,0,0.85);
      flex-grow: 1;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .result-title {
      font-size: 38px;
      font-weight: 900;
      margin-bottom: 16px;
    }
    .result-title.success { color: var(--bw-lime); }
    .result-title.fail { color: var(--bw-error); }
    
    .result-msg {
      font-size: 18px;
      color: var(--bw-text-muted);
      margin-bottom: 30px;
      max-width: 500px;
      line-height: 1.5;
    }
    
    .global-stats {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      color: var(--bw-white);
    }
    .global-stats span {
      display: block;
      font-weight: 700;
      color: var(--bw-yellow);
      margin-bottom: 4px;
    }
    
    .restart-btn {
      background: transparent;
      border: 2px solid var(--bw-white);
      color: var(--bw-white);
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
    }
    .restart-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .share-btn {
      background: var(--bw-yellow);
      color: var(--bw-green-dark);
      border-color: var(--bw-yellow);
    }
    .share-btn:hover {
      background: #FFF04D;
    }
    
    .action-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    /* Force hide brand.js auto-injected footer badge in standalone view */
    .bw-attr-badge { display: none !important; }
  </style>
</head>
<body>
  <main id="bw-bouncer-sim">
    <div class="progress-bar" id="progress"><div class="progress-fill" id="progress-fill"></div></div>
    
    <div id="start-screen" class="bouncer-hero">
      <span class="kicker">Playable Now</span>
      <h1>Can You Get Into Berghain?</h1>
      <p class="lead-text">Test your Berlin clubbing instincts against the world's strictest door policy. Make your choices and see if you make it past the bouncer.</p>
      <button class="btn-start" onclick="startGame()">Try to get in</button>
    </div>
    
    <div id="game-container">
      <div id="countdown-text">5</div>
      <div class="dialogue-box">
        <p class="question-title" id="question-text"></p>
      </div>
      <div class="options-grid" id="options-grid"></div>
      <div class="timer-bar" id="timer"><div class="timer-fill" id="timer-fill"></div></div>
    </div>
    
    <div id="result-container">
      <h2 class="result-title" id="result-title"></h2>
      <p class="result-msg" id="result-msg"></p>
      <div class="global-stats" id="global-stats" style="display: none;">
        <span>Global Rejection Rate</span>
        <div id="stats-text">Loading stats...</div>
      </div>
      <div class="action-row">
        <button class="restart-btn share-btn" onclick="shareResult()">Share Result</button>
        <button class="restart-btn" onclick="location.reload()">Try Again</button>
      </div>
    </div>
  </main>

  <script>
    let gameData = null;
    let currentPhaseId = 'outfit';
    let score = 0;
    let stepCount = 0;
    let bgmAudio = null;
    let currentVoiceAudio = null;
    let countdown;
    let countdownInterval;
    
    const simContainer = document.getElementById('bw-bouncer-sim');

    async function loadData() {
      try {
        const response = await fetch('data.json');
        gameData = await response.json();
      } catch (err) {
        console.error("Failed to load game data:", err);
      }
    }
    
    function startGame() {
      if (!gameData) return;
      
      // Start Background Music
      bgmAudio = new Audio('assets/audio/techno_loop.wav');
      bgmAudio.loop = true;
      bgmAudio.volume = 0.4;
      bgmAudio.play().catch(e => console.log("Audio play blocked by browser:", e));
      
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('game-container').style.display = 'flex';
      
      showPhase();
    }
    
    // Typewriter effect
    let typeTimeout;
    function typeText(element, text, speed = 30) {
      clearTimeout(typeTimeout);
      element.textContent = '';
      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          typeTimeout = setTimeout(typeWriter, speed);
        }
      }
      typeWriter();
    }
    
    function triggerShake() {
      simContainer.classList.remove('shake');
      void simContainer.offsetWidth; // trigger reflow
      simContainer.classList.add('shake');
    }

    function setBackground(state) {
      simContainer.classList.remove('club-lights');
      if (state === 'idle' || state === 'queue') {
        simContainer.style.backgroundImage = "url('assets/bouncer_idle.png')";
        if (state === 'idle') simContainer.classList.add('club-lights');
      } else if (state === 'suspicious') {
        simContainer.style.backgroundImage = "url('assets/bouncer_suspicious.png')";
        simContainer.classList.add('club-lights');
      } else if (state === 'sven') {
        simContainer.style.backgroundImage = "url('assets/sven_boss.png')";
        simContainer.classList.add('club-lights');
      } else if (state === 'success' || state === 'vip') {
        simContainer.style.backgroundImage = "url('assets/success.png')";
      } else if (state === 'fail' || state === 'shame') {
        simContainer.style.backgroundImage = "url('assets/fail.png')";
      } else {
        simContainer.style.backgroundImage = "none";
      }
    }
    
    function startTimer(durationMs) {
      document.getElementById('timer').style.display = 'block';
      const fill = document.getElementById('timer-fill');
      fill.style.transition = 'none';
      fill.style.width = '100%';
      setTimeout(() => {
        fill.style.transition = `width ${durationMs}ms linear`;
        fill.style.width = '0%';
      }, 50);

      const cdText = document.getElementById('countdown-text');
      cdText.style.display = 'block';
      let secLeft = durationMs / 1000;
      cdText.textContent = secLeft;
      
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        secLeft--;
        if (secLeft > 0) {
          cdText.textContent = secLeft;
        } else {
          clearInterval(countdownInterval);
        }
      }, 1000);

      clearTimeout(countdown);
      countdown = setTimeout(() => {
        score = -200; // instant fail
        showResult("You froze under pressure. The bouncer stared right through you and pointed to the exit.");
      }, durationMs);
    }

    function showPhase() {
      if (!gameData.phases[currentPhaseId]) {
        showResult();
        return;
      }
      
      const phase = gameData.phases[currentPhaseId];
      
      // Handle random pool vs single question
      let q = phase;
      if (phase.randomPool) {
        q = phase.randomPool[Math.floor(Math.random() * phase.randomPool.length)];
      }
      
      const bState = phase.bouncerState || q.bouncerState || 'none';
      setBackground(bState);
      
      // Start 5s timer if facing the bouncer
      if (bState === 'idle' || bState === 'suspicious' || bState === 'sven') {
         startTimer(5000);
      } else {
         document.getElementById('timer').style.display = 'none';
         document.getElementById('countdown-text').style.display = 'none';
         clearTimeout(countdown);
         clearInterval(countdownInterval);
      }
      
      const qTextEl = document.getElementById('question-text');
      typeText(qTextEl, q.question);
      
      // Play voice if exists
      if (currentVoiceAudio) currentVoiceAudio.pause();
      if (q.audio) {
        currentVoiceAudio = new Audio(q.audio);
        currentVoiceAudio.volume = 1.0;
        currentVoiceAudio.play().catch(e => console.log("Voice blocked:", e));
      }
      
      const grid = document.getElementById('options-grid');
      grid.innerHTML = '';
      
      if (q.viewType === 'cards' || phase.viewType === 'cards') {
        grid.className = 'options-grid cards-view';
        q.options.forEach(opt => {
          const btn = document.createElement('div');
          btn.className = 'card-btn';
          btn.onclick = () => selectOption(opt.score, opt.next);
          btn.innerHTML = `<img src="${opt.image}" alt=""><div class="card-label">${opt.text}</div>`;
          grid.appendChild(btn);
        });
      } else {
        grid.className = 'options-grid';
        q.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = opt.text;
          btn.onclick = () => selectOption(opt.score, opt.next);
          grid.appendChild(btn);
        });
      }
      
      updateProgress();
    }
    
    function selectOption(points, nextPhaseId) {
      clearTimeout(countdown);
      clearInterval(countdownInterval);
      document.getElementById('timer').style.display = 'none';
      document.getElementById('countdown-text').style.display = 'none';
      
      if (points < 0) triggerShake();
      
      score += points;
      stepCount++;
      
      if (points <= -100) {
        showResult();
        return;
      }
      
      if (nextPhaseId === 'end') {
        showResult();
        return;
      }
      
      // Easter Egg Check
      if (nextPhaseId === 'door1' && score === 13) {
        currentPhaseId = 'sven_encounter';
      } else {
        currentPhaseId = nextPhaseId;
      }
      
      showPhase();
    }
    
    function showResult(customMsg = null) {
      document.getElementById('game-container').style.display = 'none';
      document.getElementById('progress').style.display = 'none';
      
      const resContainer = document.getElementById('result-container');
      const titleEl = document.getElementById('result-title');
      const msgEl = document.getElementById('result-msg');
      
      resContainer.style.display = 'flex';
      
      let endingKey = 'fail';
      if (score <= -100) {
        endingKey = 'shame';
      } else if (score >= gameData.vipThreshold) {
        endingKey = 'vip';
      } else if (score >= gameData.threshold) {
        endingKey = 'success';
      }
      
      setBackground(endingKey);
      
      const resData = gameData.results[endingKey];
      
      // Handle ending music / audio
      if (bgmAudio) bgmAudio.pause();
      if (currentVoiceAudio) currentVoiceAudio.pause();
      
      if (resData.audio) {
        currentVoiceAudio = new Audio(resData.audio);
        currentVoiceAudio.play().catch(e => console.log(e));
      }
      
      titleEl.textContent = resData.title;
      titleEl.className = 'result-title ' + (endingKey === 'success' || endingKey === 'vip' ? 'success' : 'fail');
      msgEl.textContent = customMsg ? customMsg : resData.message;
      
      // Save endingKey globally for sharing
      window.currentEnding = endingKey;
      
      // Fetch Mock Global Stats
      fetchGlobalStats(endingKey === 'success' || endingKey === 'vip');
    }
    
    function fetchGlobalStats(isSuccess) {
      document.getElementById('global-stats').style.display = 'block';
      setTimeout(() => {
        // Mock data logic. To connect to Wix, replace this with a fetch() call to Wix Velo HTTP Function.
        const total = 1452 + Math.floor(Math.random() * 50);
        const rejected = Math.floor(total * 0.92);
        const rate = ((rejected/total)*100).toFixed(1);
        const topRate = (100 - rate).toFixed(1);
        
        if (isSuccess) {
          document.getElementById('stats-text').innerHTML = `Today: ${rejected} rejected.<br>You are in the top ${topRate}%.`;
        } else {
          document.getElementById('stats-text').innerHTML = `Today: ${rejected} rejected.<br>You are part of the ${rate}%.`;
        }
      }, 800);
    }
    
    function fallbackCopy(text) {
      const fullText = `${text} Try it here: ${window.location.href}`;
      if (navigator.clipboard) {
        navigator.clipboard.writeText(fullText).then(() => {
          alert('Result copied to clipboard!');
        }).catch(() => alert('Could not copy automatically.'));
      } else {
        alert('Share this link: ' + window.location.href);
      }
    }

    function shareResult() {
      let statsText = document.getElementById('stats-text').innerText.replace('\n', ' ');
      if (statsText.includes("Loading")) statsText = "";
      
      const texts = {
        vip: `I am a Stammgast! I breezed past the world's hardest door. ${statsText}`,
        success: `I got in! I survived the Berlin Bouncer Simulator. ${statsText}`,
        fail: `Heute leider nicht. I got rejected at the Berghain door. ${statsText}`,
        shame: `I got kicked out of the line for being a tourist... ${statsText}`
      };
      const text = texts[window.currentEnding] || "Can you get into Berghain?";
      
      if (navigator.share) {
        navigator.share({
          title: 'Berlin Bouncer Simulator',
          text: text,
          url: window.location.href
        }).catch(err => {
          console.log('Native share not supported or cancelled:', err);
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
    }
    
    function updateProgress() {
      const pct = (stepCount / 4) * 100; // max steps is typically 4
      document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';
    }
    
    // Init
    loadData();
  </script>
</body>
</html>
