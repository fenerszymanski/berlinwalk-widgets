<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reviews - Berlin Walk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: transparent; }
    body {
      font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
      color: #212121;
      -webkit-font-smoothing: antialiased;
    }

    .bw-reviews {
      --bw-green: #1B5E20;
      --bw-green-dark: #164a1a;
      --bw-yellow: #FFE600;
      --bw-lime: #7CB342;
      --bw-light-green: #C5E1A5;
      --bw-border: #DCE8C8;
      --bw-text: #212121;
      --bw-muted: #4E5A4E;
      --bw-soft: #f6f4ec;
      --bw-white: #ffffff;
      width: 100%;
      max-width: 880px;
      margin: 0 auto;
      padding: 16px;
      box-sizing: border-box;
    }
    .bw-reviews * { box-sizing: border-box; }

    /* Summary header */
    .bw-summary {
      text-align: center;
      padding: 28px 24px;
      background: var(--bw-yellow);
      border-radius: 12px;
      margin-bottom: 28px;
    }
    .bw-summary-kicker {
      margin: 0 0 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bw-green);
    }
    .bw-summary-title {
      margin: 0 0 14px;
      font-family: 'Merriweather', Georgia, serif;
      font-weight: 700;
      font-size: 28px;
      line-height: 1.2;
      color: var(--bw-green);
    }
    .bw-summary-rating {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      color: var(--bw-green);
    }
    .bw-summary-rating .bw-stars-display {
      font-size: 22px;
      letter-spacing: 1px;
    }
    .bw-summary-count {
      margin: 8px 0 0;
      font-size: 13px;
      color: var(--bw-green);
      font-weight: 500;
    }

    /* States */
    .bw-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--bw-muted);
      font-size: 14px;
    }
    .bw-state.error { color: #C62828; }

    /* Review cards */
    .bw-review-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 720px) {
      .bw-review-list { grid-template-columns: 1fr 1fr; }
    }

    .bw-review-card {
      background: var(--bw-white);
      border: 1px solid var(--bw-border);
      border-radius: 10px;
      padding: 22px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow 0.18s ease;
    }
    .bw-review-card:hover {
      box-shadow: 0 4px 18px rgba(27, 94, 32, 0.06);
    }

    .bw-card-stars {
      color: var(--bw-green);
      font-size: 18px;
      letter-spacing: 2px;
      line-height: 1;
    }
    .bw-card-stars .dim { color: #d0d0d0; }

    .bw-card-text {
      margin: 0;
      font-family: 'Merriweather', Georgia, serif;
      font-style: italic;
      font-size: 15px;
      line-height: 1.65;
      color: var(--bw-text);
    }

    .bw-card-byline {
      margin: 0;
      font-size: 12.5px;
      color: var(--bw-muted);
      letter-spacing: 0.02em;
    }
    .bw-card-byline strong {
      color: var(--bw-green);
      font-weight: 600;
    }
    .bw-card-byline .dot {
      margin: 0 7px;
      opacity: 0.5;
    }

    /* Footer note */
    .bw-foot {
      margin-top: 28px;
      padding: 18px 20px;
      background: var(--bw-soft);
      border-radius: 10px;
      text-align: center;
      font-size: 13px;
      color: var(--bw-muted);
      line-height: 1.6;
    }

    @media (max-width: 540px) {
      .bw-summary { padding: 22px 18px; }
      .bw-summary-title { font-size: 22px; }
      .bw-review-card { padding: 18px 20px; }
      .bw-card-text { font-size: 14.5px; }
    }
  </style>
</head>
<body>
  <div class="bw-reviews" id="bw-reviews">
    <div class="bw-state" id="bw-loading">Loading reviews...</div>
  </div>

  <template id="bw-tpl-summary">
    <div class="bw-summary">
      <p class="bw-summary-kicker">What guests are saying</p>
      <h1 class="bw-summary-title">Berlin Walk reviews</h1>
      <div class="bw-summary-rating">
        <span class="bw-rating-num"></span>
        <span class="bw-stars-display"></span>
      </div>
      <p class="bw-summary-count"></p>
    </div>
  </template>

  <template id="bw-tpl-card">
    <div class="bw-review-card">
      <div class="bw-card-stars"></div>
      <p class="bw-card-text"></p>
      <p class="bw-card-byline"></p>
    </div>
  </template>

  <script>
    (function () {
      var API_URL = 'https://www.berlinwalk.com/_functions/listReviews?limit=50';
      var root = document.getElementById('bw-reviews');
      var tplSummary = document.getElementById('bw-tpl-summary');
      var tplCard = document.getElementById('bw-tpl-card');

      var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      function stars(rating, max) {
        max = max || 5;
        var r = Math.max(0, Math.min(max, Math.round(rating || 0)));
        return '★'.repeat(r) + '<span class="dim">' + '★'.repeat(max - r) + '</span>';
      }

      function formatDate(d) {
        try {
          var date = new Date(d);
          if (isNaN(date)) return '';
          return MONTHS[date.getMonth()] + ' ' + date.getFullYear();
        } catch (e) { return ''; }
      }

      function buildSummary(reviews, totalCount) {
        var node = tplSummary.content.cloneNode(true);
        var avg = 0;
        if (reviews.length > 0) {
          var sum = reviews.reduce(function (acc, r) { return acc + (r.rating || 0); }, 0);
          avg = Math.round((sum / reviews.length) * 10) / 10;
        }
        node.querySelector('.bw-rating-num').textContent = avg ? avg.toFixed(1) : '—';
        node.querySelector('.bw-stars-display').innerHTML = stars(avg);
        var count = totalCount || reviews.length;
        node.querySelector('.bw-summary-count').textContent = count
          ? 'Based on ' + count + ' ' + (count === 1 ? 'review' : 'reviews')
          : 'No reviews yet, be the first to walk Berlin with me.';
        return node;
      }

      function buildCard(r) {
        var node = tplCard.content.cloneNode(true);
        node.querySelector('.bw-card-stars').innerHTML = stars(r.rating);
        node.querySelector('.bw-card-text').textContent = '“' + (r.reviewText || '') + '”';

        var byline = node.querySelector('.bw-card-byline');
        var bylineParts = [];
        var nameStr = '';
        if (r.showName && r.firstName) {
          nameStr = r.firstName;
          if (r.lastInitial) nameStr += ' ' + r.lastInitial + '.';
        } else {
          nameStr = 'Anonymous';
        }
        bylineParts.push('<strong>' + nameStr + '</strong>');
        if (r.country) bylineParts.push(r.country);
        var dateStr = formatDate(r.createdDate);
        if (dateStr) bylineParts.push(dateStr);
        byline.innerHTML = bylineParts.join('<span class="dot">&middot;</span>');
        return node;
      }

      function render(data) {
        root.innerHTML = '';
        var reviews = data.reviews || [];
        var totalCount = data.totalCount || 0;

        root.appendChild(buildSummary(reviews, totalCount));

        if (reviews.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'bw-state';
          empty.textContent = 'No reviews yet. After the next walk, this page will start to fill up.';
          root.appendChild(empty);
          return;
        }

        var list = document.createElement('div');
        list.className = 'bw-review-list';
        reviews.forEach(function (r) { list.appendChild(buildCard(r)); });
        root.appendChild(list);

        var foot = document.createElement('div');
        foot.className = 'bw-foot';
        foot.textContent = 'Walked with me before? Use the link in your post-tour email to leave a review.';
        root.appendChild(foot);
      }

      function renderError() {
        root.innerHTML = '<div class="bw-state error">Could not load reviews right now. Please try again in a moment.</div>';
      }

      fetch(API_URL)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data && data.success) render(data);
          else renderError();
        })
        .catch(function (err) {
          console.error('listReviews fetch error:', err);
          renderError();
        });
    })();
  </script>
</body>
</html>
