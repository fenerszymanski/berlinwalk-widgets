<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Berlin and Cölln annotated map render</title>
  <style>
    html,
    body {
      background: #fafaf5;
      margin: 0;
      padding: 0;
      width: 1800px;
      height: 1159px;
      overflow: hidden;
      font-family: Montserrat, Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 1800px;
      height: 1159px;
      overflow: hidden;
      background: #fafaf5;
    }

    .stage img {
      display: block;
      width: 1800px;
      height: 1159px;
      object-fit: cover;
      filter: sepia(0.08) contrast(1.06);
    }

    .wash {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(18, 60, 22, 0.08), rgba(18, 60, 22, 0.01)),
        radial-gradient(circle at 54% 56%, rgba(255, 230, 0, 0.12), transparent 36%);
      pointer-events: none;
    }

    .zone {
      position: absolute;
      border: 10px solid #1b5e20;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }

    .berlin {
      left: 655px;
      top: 355px;
      width: 435px;
      height: 330px;
      background: rgba(197, 225, 165, 0.28);
      transform: rotate(-4deg);
    }

    .coelln {
      left: 850px;
      top: 640px;
      width: 395px;
      height: 285px;
      background: rgba(255, 230, 0, 0.24);
      transform: rotate(-8deg);
    }

    .pin {
      position: absolute;
      width: 28px;
      height: 28px;
      border: 7px solid #1b5e20;
      border-radius: 999px;
      background: #ffe600;
      box-shadow: 0 7px 20px rgba(0, 0, 0, 0.32);
      z-index: 5;
    }

    .pin.berlin-pin {
      left: 948px;
      top: 453px;
    }

    .pin.coelln-pin {
      left: 1112px;
      top: 744px;
    }

    .label {
      position: absolute;
      z-index: 4;
      max-width: 420px;
      padding: 24px 28px;
      border: 4px solid rgba(27, 94, 32, 0.38);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.24);
      color: #212121;
      font-size: 32px;
      font-weight: 850;
      line-height: 1.18;
    }

    .label strong {
      display: block;
      margin-bottom: 6px;
      color: #1b5e20;
      font-size: 36px;
      font-weight: 950;
    }

    .berlin-label {
      left: 980px;
      top: 430px;
    }

    .coelln-label {
      left: 1125px;
      top: 735px;
    }

    .crossing {
      position: absolute;
      left: 820px;
      top: 612px;
      z-index: 3;
      width: 360px;
      height: 26px;
      border-radius: 999px;
      background: #ffe600;
      box-shadow: 0 0 0 8px rgba(27, 94, 32, 0.72), 0 12px 35px rgba(0, 0, 0, 0.26);
      transform: rotate(-7deg);
    }

    .crossing-label {
      position: absolute;
      left: 742px;
      top: 545px;
      z-index: 4;
      padding: 18px 22px;
      border-radius: 16px;
      background: rgba(27, 94, 32, 0.94);
      color: #fff;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.12;
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    }

    .crossing-label span {
      display: block;
      color: #ffe600;
      font-size: 22px;
      font-weight: 850;
      margin-top: 4px;
    }

    .credit {
      position: absolute;
      left: 34px;
      bottom: 24px;
      z-index: 5;
      max-width: 1180px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(250, 250, 245, 0.9);
      color: #334033;
      font-size: 21px;
      font-weight: 800;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Annotated old map of Berlin and Cölln">
    <img src="berlin-coelln-1652-map.jpg" alt="">
    <div class="wash"></div>
    <div class="zone berlin"></div>
    <div class="zone coelln"></div>
    <div class="crossing"></div>
    <div class="crossing-label">Mühlendamm<span>crossing, tolls, trade</span></div>
    <div class="pin berlin-pin"></div>
    <div class="pin coelln-pin"></div>
    <div class="label berlin-label"><strong>Berlin</strong>eastern town around today's Nikolaiviertel</div>
    <div class="label coelln-label"><strong>Cölln</strong>Spree island, the older paper trail</div>
    <div class="credit">Base map: Johann Gregor Memhardt / Gabriel Bodenehr, Berlin and Cölln, 1652/1720. BerlinWalk overlay.</div>
  </main>
</body>
</html>
