<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2 Days in Berlin Itinerary - Contact Sheet</title>
  <style>
    body { margin: 0; padding: 28px; background: #f3f3ee; color: #212121; font: 14px/1.45 Arial, sans-serif; }
    h1 { margin: 0 0 22px; color: #1b5e20; }
    main { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px; }
    figure { margin: 0; padding: 12px; border: 1px solid #d6dfce; border-radius: 14px; background: white; }
    img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; border-radius: 9px; display: block; }
    figcaption { margin-top: 9px; font-weight: 700; }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>2 Days in Berlin Itinerary - Final Image Set</h1>
  <main>
    <figure><img src="optimized/01-museum-island-tv-tower-cover.jpg" alt=""><figcaption>01 - Cover: Museum Island + TV Tower</figcaption></figure>
    <figure><img src="optimized/02-brandenburg-gate-morning.jpg" alt=""><figcaption>02 - Brandenburg Gate</figcaption></figure>
    <figure><img src="optimized/03-bernauer-wall-memorial.jpg" alt=""><figcaption>03 - Bernauer Strasse memorial</figcaption></figure>
    <figure><img src="optimized/04-east-side-gallery-walk.jpg" alt=""><figcaption>04 - East Side Gallery</figcaption></figure>
    <figure><img src="optimized/05-oberbaumbruecke-sunset.jpg" alt=""><figcaption>05 - Oberbaum Bridge</figcaption></figure>
  </main>
</body>
</html>
