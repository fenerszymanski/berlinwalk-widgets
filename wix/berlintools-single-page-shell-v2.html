<!-- BerlinTools Single Page Shell V2 Wix HEAD embed template.
     The updater replaces __COMMIT_SHA__ with a pinned widgets-repo commit. -->
<style id="berlintools-shell-v2-lower-layout-guard">
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozn18up {padding-top:34px!important;}
  html.bw-tools-detail.bw-tools-shell-v2 body .bw-tools-shell-v2-local-note {margin-bottom:8px!important;}
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozn18up .comp-mozn18up-container {
    align-items:stretch!important;box-sizing:border-box!important;display:flex!important;flex-direction:column!important;height:auto!important;margin:0 auto!important;max-width:960px!important;min-height:0!important;padding:0!important;width:min(100%,960px)!important;
  }
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozn18up #comp-mozn27df {
    box-sizing:border-box!important;height:auto!important;inset:auto!important;margin:0!important;max-width:960px!important;min-height:0!important;min-width:0!important;position:relative!important;transform:none!important;width:100%!important;
  }
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv .comp-mozp1zlv-container {
    align-items:stretch!important;box-sizing:border-box!important;column-gap:20px!important;display:grid!important;grid-auto-rows:auto!important;grid-template-areas:'title title' 'first second'!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;grid-template-rows:max-content minmax(168px,max-content)!important;margin:0 auto!important;max-width:960px!important;min-height:0!important;padding:0!important;row-gap:16px!important;width:min(100%,960px)!important;
  }
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv #comp-mozpfm6g {
    grid-area:title!important;height:auto!important;margin:0 0 4px!important;min-height:0!important;text-align:center!important;width:100%!important;
  }
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv #comp-mozp2aft,
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv #comp-mozp3f25 {
    align-self:stretch!important;height:auto!important;justify-self:stretch!important;margin:0!important;min-height:168px!important;width:100%!important;
  }
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv #comp-mozp2aft {grid-area:first!important;}
  html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv #comp-mozp3f25 {grid-area:second!important;}
  @media (max-width:699px) {
    html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozn18up .comp-mozn18up-container,
    html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv .comp-mozp1zlv-container {max-width:100%!important;width:100%!important;}
    html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozp1zlv .comp-mozp1zlv-container {grid-template-areas:'title' 'first' 'second'!important;grid-template-columns:minmax(0,1fr)!important;grid-template-rows:max-content minmax(168px,max-content) minmax(168px,max-content)!important;}
  }
  @media (max-width:899px) {
    html.bw-tools-detail.bw-tools-shell-v2 body #comp-mozn18up {padding-top:28px!important;}
  }
</style>
<script>
  (function () {
    var path = String(window.location.pathname || '').toLowerCase().replace(/\/{2,}/g, '/');
    if (!/^\/tools\/[^/]+\/?$/.test(path)) return;
    var commit = '__COMMIT_SHA__';
    var base = 'https://cdn.jsdelivr.net/gh/fenerszymanski/berlinwalk-widgets@' + commit + '/';
    var cssHref = base + 'css/berlintools-single-page-shell-v2.css?commit=' + commit;
    var jsSrc = base + 'js/berlintools-single-page-shell-v2.js?commit=' + commit;

    if (!document.querySelector('link[data-bw-shell-v2-css]')) {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = cssHref;
      link.setAttribute('data-bw-shell-v2-css', commit);
      document.head.appendChild(link);
    }

    if (!document.querySelector('script[data-bw-shell-v2-js]')) {
      var script = document.createElement('script');
      script.src = jsSrc;
      script.async = false;
      script.setAttribute('data-bw-shell-v2-js', commit);
      document.head.appendChild(script);
    }
  })();
</script>
