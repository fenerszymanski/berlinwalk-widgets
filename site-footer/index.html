<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BerlinWalk Site Footer Preview</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      background: #FAFAF5;
      margin: 0;
    }

    .preview-spacer {
      color: #4E5A4E;
      font-family: Montserrat, Arial, sans-serif;
      margin: 0 auto;
      max-width: 920px;
      padding: 42px 24px;
    }

    .preview-spacer h1 {
      color: #1B5E20;
      font-size: 32px;
      line-height: 1.15;
      margin: 0 0 10px;
    }

    .preview-spacer p {
      font-size: 16px;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="preview-spacer" aria-label="Preview context">
    <h1>Footer preview</h1>
    <p>This spacer only gives the footer a page context for local visual checks. Use the custom element in Wix Studio.</p>
  </main>

  <bw-site-footer></bw-site-footer>
  <script src="./site-footer-element.js"></script>
</body>
</html>
