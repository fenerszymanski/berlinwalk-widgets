<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>BerlinWalk 390px Editorial Preview</title>
    <style>
      html, body { background: #e7ebe5; margin: 0; min-height: 100%; }
      .shell { margin: 20px auto; width: min(390px, calc(100vw - 24px)); }
      .label {
        color: #102414;
        font: 800 11px/1.3 Montserrat, Arial, sans-serif;
        letter-spacing: .1em;
        margin: 0 0 9px;
        text-transform: uppercase;
      }
      iframe {
        background: #fafaf5;
        border: 1px solid rgba(16, 36, 20, .28);
        border-radius: 10px;
        box-shadow: 0 18px 44px rgba(16, 36, 20, .14);
        display: block;
        height: min(844px, calc(100vh - 70px));
        width: 390px;
        max-width: 100%;
      }
    </style>
  </head>
  <body>
    <figure class="shell">
      <figcaption class="label" id="label">390px CSS viewport</figcaption>
      <iframe id="preview" title="BerlinWalk mobile editorial preview"></iframe>
    </figure>
    <script>
      const pages = {
        meeting: { label: 'Meeting Point · 390px CSS viewport', src: '../meeting-point/' },
        reviews: { label: 'Reviews · 390px CSS viewport', src: '../reviews/' },
        guide: { label: 'The Guide · 390px CSS viewport', src: '../the-guide/' },
        route: { label: 'Route · 390px CSS viewport', src: '../route-story/' },
      };
      const params = new URLSearchParams(location.search);
      const key = params.get('page') || 'meeting';
      const page = pages[key] || pages.meeting;
      const capture = params.get('capture');
      const frame = document.getElementById('preview');
      document.getElementById('label').textContent = page.label;
      frame.addEventListener('load', () => frame.contentWindow.scrollTo(0, 0));
      frame.src = capture ? `${page.src}?preview=${encodeURIComponent(capture)}` : page.src;
    </script>
  </body>
</html>
