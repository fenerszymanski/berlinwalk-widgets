<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>BerlinWalk Homepage Editorial Mobile Preview</title>
    <style>
      html,
      body {
        background: #e9ece7;
        margin: 0;
        min-height: 100%;
      }

      .bw-mobile-preview {
        margin: 24px auto;
        width: min(390px, calc(100vw - 24px));
      }

      .bw-mobile-preview__label {
        color: #102414;
        font: 700 12px/1.3 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0.08em;
        margin: 0 0 10px;
        text-transform: uppercase;
      }

      .bw-mobile-preview__frame {
        background: #fafaf5;
        border: 1px solid rgba(16, 36, 20, 0.28);
        border-radius: 10px;
        box-shadow: 0 18px 44px rgba(16, 36, 20, 0.15);
        display: block;
        height: min(844px, calc(100vh - 82px));
        width: 100%;
      }
    </style>
  </head>
  <body>
    <figure class="bw-mobile-preview">
      <figcaption class="bw-mobile-preview__label">390px CSS viewport · scroll inside the preview</figcaption>
      <iframe
        class="bw-mobile-preview__frame"
        title="BerlinWalk homepage at a 390 pixel CSS viewport"
        src="./preview.html"
      ></iframe>
    </figure>
  </body>
</html>
