<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BerlinWalk FAQ</title>
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    body { background: transparent; padding: 0; margin: 0; }
    .bw-faq {
      max-width: 100%;
      margin: 28px auto;
      font-family: Montserrat, Arial, sans-serif;
      color: #212121;
    }
    .bw-faq-header {
      background: #1B5E20;
      padding: 18px 20px;
      border-radius: 10px 10px 0 0;
    }
    .bw-faq-kicker {
      color: #FFE600;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .bw-faq-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
    }
    .bw-faq-sub {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .bw-faq-tabs {
      display: flex;
      gap: 24px;
      padding: 14px 20px 0;
      background: #fff;
      border-left: 1px solid #e0e0d8;
      border-right: 1px solid #e0e0d8;
      flex-wrap: wrap;
    }
    .bw-faq-tab {
      background: none;
      border: 0;
      padding: 8px 0 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      color: #8a8a8a;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
    }
    .bw-faq-tab:hover { color: #1B5E20; }
    .bw-faq-tab[aria-selected="true"] {
      color: #1B5E20;
      border-bottom-color: #1B5E20;
    }
    .bw-faq-items {
      border: 1px solid #e0e0d8;
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
    }
    .bw-faq-tabs + .bw-faq-panel .bw-faq-items,
    .bw-faq-tabs ~ .bw-faq-panel .bw-faq-items { border-top: 1px solid #e0e0d8; }
    .bw-faq-panel[hidden] { display: none; }
    .bw-faq-item {
      border-bottom: 1px solid #e8e8e4;
      background: #fff;
    }
    .bw-faq-item:last-child { border-bottom: none; }
    .bw-faq-q {
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 700;
      color: #212121;
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .bw-faq-q::-webkit-details-marker { display: none; }
    .bw-faq-q:hover { background: #f9f9f6; }
    .bw-faq-icon {
      color: #1B5E20;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .bw-faq-item[open] .bw-faq-icon { transform: rotate(45deg); }
    .bw-faq-a {
      padding: 0 20px 16px 20px;
      font-size: 13px;
      color: #555;
      line-height: 1.7;
      background: #fff;
    }
    .bw-faq-a strong { color: #212121; }
    .bw-faq-a a { color: #1B5E20; font-weight: 600; }
    .bw-empty { padding: 18px; color: #4E5A4E; font-size: 14px; background: #FAFAF5; border-radius: 10px; }
    @media (max-width: 520px) {
      .bw-faq { margin: 22px auto; }
      .bw-faq-header { padding: 16px 18px; border-radius: 8px 8px 0 0; }
      .bw-faq-title { font-size: 17px; }
      .bw-faq-tabs { gap: 18px; padding: 12px 16px 0; }
      .bw-faq-tab { font-size: 12px; padding-bottom: 10px; }
      .bw-faq-q { padding: 12px 16px; font-size: 13.5px; }
      .bw-faq-a { padding: 0 16px 14px 16px; font-size: 12.5px; }
    }
  </style>
</head>
<body>
  <section class="bw-faq" data-field="root">
    <div class="bw-faq-header">
      <div class="bw-faq-kicker">BERLIN WALK</div>
      <div class="bw-faq-title">Frequently Asked Questions</div>
      <div class="bw-faq-sub" data-field="subtitle"></div>
    </div>
    <div data-field="body">
      <div class="bw-faq-items"><div class="bw-empty">Loading…</div></div>
    </div>
  </section>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');
      var root = document.querySelector('[data-field="root"]');
      var subEl = root.querySelector('[data-field="subtitle"]');
      var bodyEl = root.querySelector('[data-field="body"]');

      function escapeHtml(t){return t.replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];});}

      function answerHtml(a) {
        var s = escapeHtml(a);
        s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        return s;
      }

      function renderItems(items) {
        if (!Array.isArray(items) || !items.length) {
          return '<div class="bw-empty">No questions configured.</div>';
        }
        return '<div class="bw-faq-items">' + items.map(function (qa) {
          return '<details class="bw-faq-item">' +
            '<summary class="bw-faq-q">' +
              '<span>' + escapeHtml(qa.q) + '</span>' +
              '<span class="bw-faq-icon">+</span>' +
            '</summary>' +
            '<div class="bw-faq-a">' + answerHtml(qa.a) + '</div>' +
          '</details>';
        }).join('') + '</div>';
      }

      function attachToggleListeners() {
        bodyEl.querySelectorAll('details.bw-faq-item').forEach(function (d) {
          d.addEventListener('toggle', postHeight);
        });
      }

      function renderFlat(cfg) {
        bodyEl.innerHTML = '<div class="bw-faq-panel">' + renderItems(cfg.items) + '</div>';
        attachToggleListeners();
      }

      function renderTabs(cfg) {
        var tabs = cfg.tabs || [];
        var tabsHtml = '<div class="bw-faq-tabs" role="tablist">' +
          tabs.map(function (t, i) {
            return '<button class="bw-faq-tab" role="tab" data-tab-idx="' + i + '"' +
              ' aria-selected="' + (i === 0 ? 'true' : 'false') + '">' +
              escapeHtml(t.name) + '</button>';
          }).join('') +
        '</div>';
        var panelsHtml = tabs.map(function (t, i) {
          return '<div class="bw-faq-panel" data-panel-idx="' + i + '"' +
            (i === 0 ? '' : ' hidden') + '>' + renderItems(t.items) + '</div>';
        }).join('');
        bodyEl.innerHTML = tabsHtml + panelsHtml;

        bodyEl.querySelectorAll('.bw-faq-tab').forEach(function (btn) {
          btn.addEventListener('click', function () {
            var idx = btn.getAttribute('data-tab-idx');
            bodyEl.querySelectorAll('.bw-faq-tab').forEach(function (b) {
              b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
            });
            bodyEl.querySelectorAll('.bw-faq-panel').forEach(function (p) {
              if (p.getAttribute('data-panel-idx') === idx) p.removeAttribute('hidden');
              else p.setAttribute('hidden', '');
            });
            postHeight();
          });
        });
        attachToggleListeners();
      }

      function render(cfg) {
        if (cfg.subtitle) subEl.textContent = cfg.subtitle; else subEl.style.display = 'none';
        if (Array.isArray(cfg.tabs) && cfg.tabs.length) renderTabs(cfg);
        else renderFlat(cfg);
        requestAnimationFrame(postHeight);
      }

      function postHeight() {
        // Matches the parent-side "BerlinWalk widget auto-resize" listener
        // which expects { type: 'bw-resize', height: N }.
        // We include a `src` marker so the listener can match this iframe
        // by URL substring even when it's nested inside a Wix sandbox where
        // contentWindow !== e.source.
        var h = document.documentElement.getBoundingClientRect().height;
        var msg = {
          type: 'bw-resize',
          height: Math.ceil(h),
          src: location.pathname + location.search
        };
        // Post to window.top first (reaches the main page even through
        // a Wix sandbox), then window.parent (works on direct embeds).
        try {
          if (window.top && window.top !== window) window.top.postMessage(msg, '*');
        } catch (e) {}
        try {
          if (window.parent && window.parent !== window && window.parent !== window.top) {
            window.parent.postMessage(msg, '*');
          }
        } catch (e) {}
      }
      window.addEventListener('load', postHeight);
      window.addEventListener('resize', postHeight);

      if (!slug) {
        bodyEl.innerHTML = '<div class="bw-faq-items"><div class="bw-empty">Add <code>?post=slug</code> to load questions.</div></div>';
        subEl.style.display = 'none';
        return;
      }

      fetch('./data.json')
        .then(function (r) { if (!r.ok) throw new Error('404'); return r.json(); })
        .then(function (d) {
          if (d[slug]) render(d[slug]);
          else { bodyEl.innerHTML = '<div class="bw-faq-items"><div class="bw-empty">FAQ not configured for <strong>' + escapeHtml(slug) + '</strong>.</div></div>'; subEl.style.display = 'none'; }
        })
        .catch(function () {
          bodyEl.innerHTML = '<div class="bw-faq-items"><div class="bw-empty">FAQ data unavailable.</div></div>';
          subEl.style.display = 'none';
        });
    })();
  </script>
</body>
</html>
