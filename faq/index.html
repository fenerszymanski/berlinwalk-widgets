<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BerlinWalk FAQ</title>
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    body { background: transparent; padding: 0; margin: 0; }
    .bw-faq {
      max-width: 100%;
      margin: 28px auto;
      font-family: Montserrat, Arial, sans-serif;
      color: #212121;
    }
    .bw-faq-header {
      background: #1B5E20;
      padding: 18px 20px;
      border-radius: 10px 10px 0 0;
    }
    .bw-faq-kicker {
      color: #FFE600;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .bw-faq-title {
      color: #ffffff;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
    }
    .bw-faq-sub {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .bw-faq-items {
      border: 1px solid #e0e0d8;
      border-top: none;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
    }
    .bw-faq-item {
      border-bottom: 1px solid #e8e8e4;
      background: #fff;
    }
    .bw-faq-item:last-child { border-bottom: none; }
    .bw-faq-q {
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 700;
      color: #212121;
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .bw-faq-q::-webkit-details-marker { display: none; }
    .bw-faq-q:hover { background: #f9f9f6; }
    .bw-faq-icon {
      color: #1B5E20;
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }
    .bw-faq-item[open] .bw-faq-icon { transform: rotate(45deg); }
    .bw-faq-a {
      padding: 0 20px 16px 20px;
      font-size: 13px;
      color: #555;
      line-height: 1.7;
      background: #fff;
    }
    .bw-faq-a strong { color: #212121; }
    .bw-faq-a a { color: #1B5E20; font-weight: 600; }
    .bw-empty { padding: 18px; color: #4E5A4E; font-size: 14px; background: #FAFAF5; border-radius: 10px; }
    @media (max-width: 520px) {
      .bw-faq { margin: 22px auto; }
      .bw-faq-header { padding: 16px 18px; border-radius: 8px 8px 0 0; }
      .bw-faq-title { font-size: 17px; }
      .bw-faq-q { padding: 12px 16px; font-size: 13.5px; }
      .bw-faq-a { padding: 0 16px 14px 16px; font-size: 12.5px; }
    }
  </style>
</head>
<body>
  <section class="bw-faq" data-field="root">
    <div class="bw-faq-header">
      <div class="bw-faq-kicker">BERLIN WALK</div>
      <div class="bw-faq-title">Frequently Asked Questions</div>
      <div class="bw-faq-sub" data-field="subtitle"></div>
    </div>
    <div class="bw-faq-items" data-field="items">
      <div class="bw-empty">Loading…</div>
    </div>
  </section>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('post');
      var root = document.querySelector('[data-field="root"]');
      var subEl = root.querySelector('[data-field="subtitle"]');
      var itemsEl = root.querySelector('[data-field="items"]');

      function escapeHtml(t){return t.replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c];});}

      function answerHtml(a) {
        // Allow simple bold via **x** and links via [text](url)
        var s = escapeHtml(a);
        s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        return s;
      }

      function render(cfg) {
        if (cfg.subtitle) subEl.textContent = cfg.subtitle; else subEl.style.display = 'none';
        var items = Array.isArray(cfg.items) ? cfg.items : [];
        if (!items.length) {
          itemsEl.innerHTML = '<div class="bw-empty">No questions configured for this page.</div>';
          return;
        }
        itemsEl.innerHTML = items.map(function (qa) {
          return '<details class="bw-faq-item">' +
            '<summary class="bw-faq-q">' +
              '<span>' + escapeHtml(qa.q) + '</span>' +
              '<span class="bw-faq-icon">+</span>' +
            '</summary>' +
            '<div class="bw-faq-a">' + answerHtml(qa.a) + '</div>' +
          '</details>';
        }).join('');
      }

      if (!slug) {
        itemsEl.innerHTML = '<div class="bw-empty">Add <code>?post=slug</code> to load questions.</div>';
        subEl.style.display = 'none';
        return;
      }

      fetch('./data.json')
        .then(function (r) { if (!r.ok) throw new Error('404'); return r.json(); })
        .then(function (d) {
          if (d[slug]) render(d[slug]);
          else { itemsEl.innerHTML = '<div class="bw-empty">FAQ not configured for <strong>' + escapeHtml(slug) + '</strong>.</div>'; subEl.style.display = 'none'; }
        })
        .catch(function () {
          itemsEl.innerHTML = '<div class="bw-empty">FAQ data unavailable.</div>';
          subEl.style.display = 'none';
        });
    })();
  </script>
</body>
</html>
