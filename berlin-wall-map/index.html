<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Berlin Wall Remnants Map | BerlinWalk</title>
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    body { background: transparent; padding: 0; margin: 0; }

    #bw-wall-map {
      --bw-green: #1B5E20;
      --bw-yellow: #FFE600;
      --bw-border: #DCE8C8;
      --bw-text: #212121;
      --bw-muted: #4E5A4E;
      --bw-white: #FFFFFF;
      --bw-section: #1B5E20;
      --bw-memorial: #B45309;
      --bw-lime-soft: #F2F8E8;
      font-family: Montserrat, Arial, sans-serif;
      color: var(--bw-text);
      margin: 28px 0;
      max-width: 100%;
    }

    #bw-wall-map * { box-sizing: border-box; }

    #bw-wall-map .bw-wrap {
      border: 1px solid var(--bw-border);
      border-radius: 14px;
      background: var(--bw-white);
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }

    #bw-wall-map .bw-head {
      background: var(--bw-green);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #bw-wall-map .bw-head-icon { font-size: 18px; line-height: 1; }

    #bw-wall-map .bw-kicker {
      color: var(--bw-yellow);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    #bw-wall-map .bw-body {
      background: #FAFAF5;
      padding: 16px 18px;
    }

    #bw-wall-map .bw-hint {
      font-size: 13px;
      color: var(--bw-muted);
      margin: 0 0 14px;
      line-height: 1.55;
    }

    #bw-wall-map .bw-legend {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    #bw-wall-map .bw-legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--bw-text);
    }

    #bw-wall-map .bw-legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--bw-white);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    #bw-wall-map .bw-legend-dot.section { background: var(--bw-section); }
    #bw-wall-map .bw-legend-dot.memorial { background: var(--bw-memorial); }

    #bw-wall-map .bw-map-container {
      width: 100%;
      height: 460px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--bw-border);
      background: #E8EEDC;
      position: relative;
    }

    #bw-wall-map .bw-map { width: 100%; height: 100%; z-index: 1; }

    #bw-wall-map .leaflet-container {
      font-family: Montserrat, Arial, sans-serif;
      background: #E8EEDC;
    }

    #bw-wall-map .leaflet-popup-content-wrapper {
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      border: 1px solid var(--bw-border);
    }

    #bw-wall-map .leaflet-popup-content {
      margin: 0;
      width: 250px !important;
      font-family: inherit;
    }

    #bw-wall-map .leaflet-popup-tip {
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    #bw-wall-map .bw-popup-head {
      padding: 10px 14px;
      border-radius: 11px 11px 0 0;
    }

    #bw-wall-map .bw-popup-head.section { background: var(--bw-section); }
    #bw-wall-map .bw-popup-head.memorial { background: var(--bw-memorial); }

    #bw-wall-map .bw-popup-label {
      color: rgba(255,255,255,0.85);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 2px;
    }

    #bw-wall-map .bw-popup-name {
      color: var(--bw-white);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.25;
    }

    #bw-wall-map .bw-popup-body {
      padding: 11px 14px 13px;
      font-size: 12.5px;
      color: var(--bw-text);
      line-height: 1.55;
    }

    #bw-wall-map .bw-popup-addr {
      margin-top: 7px;
      font-size: 11px;
      color: var(--bw-muted);
      font-weight: 600;
    }

    #bw-wall-map .bw-marker {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 3px solid var(--bw-white);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.28);
      color: var(--bw-white);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }

    #bw-wall-map .bw-marker.section { background: var(--bw-section); }
    #bw-wall-map .bw-marker.memorial { background: var(--bw-memorial); }

    #bw-wall-map .bw-count {
      font-size: 11px;
      color: var(--bw-muted);
      margin-top: 10px;
      text-align: center;
    }

    #bw-wall-map .bw-count strong { color: var(--bw-green); font-weight: 800; }

    @media (max-width: 520px) {
      #bw-wall-map { margin: 22px 0; }
      #bw-wall-map .bw-head { padding: 12px 16px; gap: 8px; }
      #bw-wall-map .bw-head-icon { font-size: 16px; }
      #bw-wall-map .bw-kicker { font-size: 10px; letter-spacing: 2px; }
      #bw-wall-map .bw-body { padding: 14px; }
      #bw-wall-map .bw-hint { font-size: 12px; margin-bottom: 12px; }
      #bw-wall-map .bw-map-container { height: 380px; }
      #bw-wall-map .leaflet-popup-content { width: 220px !important; }
      #bw-wall-map .bw-popup-name { font-size: 13px; }
      #bw-wall-map .bw-popup-body { font-size: 12px; }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
<div id="bw-wall-map">
  <div class="bw-wrap">
    <div class="bw-head">
      <span class="bw-head-icon" aria-hidden="true">🧱</span>
      <span class="bw-kicker">Berlin Wall Remnants &amp; Memorials</span>
    </div>
    <div class="bw-body">
      <p class="bw-hint">Tap a pin to see what survives at each site and how to get there.</p>

      <div class="bw-legend">
        <div class="bw-legend-item">
          <span class="bw-legend-dot section" aria-hidden="true"></span>
          Original Wall section
        </div>
        <div class="bw-legend-item">
          <span class="bw-legend-dot memorial" aria-hidden="true"></span>
          Memorial / crossing point
        </div>
      </div>

      <div class="bw-map-container">
        <div class="bw-map" id="bw-wall-map-canvas"></div>
      </div>

      <p class="bw-count"><strong>8</strong> Berlin Wall sites mapped</p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  var root = document.getElementById('bw-wall-map');
  if (!root) return;

  var sites = [
    {
      name: 'East Side Gallery',
      type: 'section',
      lat: 52.5053, lng: 13.4404,
      note: 'The longest remaining stretch of Wall — 1.3 km of original concrete covered in murals by 100+ international artists after reunification. Completely free to walk along at any hour.',
      addr: 'Mühlenstraße, Friedrichshain · S/U Warschauer Str.'
    },
    {
      name: 'Berlin Wall Memorial (Bernauer Str.)',
      type: 'section',
      lat: 52.5352, lng: 13.3880,
      note: 'The most authentic preserved site: both walls plus the death strip between them, a guard tower, and a 1.4 km outdoor exhibition. Documentation center with a free viewing tower. Free entry.',
      addr: 'Bernauer Straße 111, Wedding · S Nordbahnhof or U8 Bernauer Str.'
    },
    {
      name: 'Topography of Terror',
      type: 'section',
      lat: 52.5054, lng: 13.3811,
      note: 'A 200 m section of original Wall along Niederkirchnerstraße, next to a free museum documenting the Gestapo and SS — built on their former headquarters. One of the most powerful free museums in Berlin.',
      addr: 'Niederkirchnerstraße 8, Mitte · S/U Potsdamer Platz'
    },
    {
      name: 'Checkpoint Charlie',
      type: 'memorial',
      lat: 52.5075, lng: 13.3904,
      note: 'The most famous East–West crossing point. The white guardhouse is a replica — the original is in a museum — but the free outdoor exhibition boards around the crossing tell the real history clearly.',
      addr: 'Friedrichstraße 43–45, Mitte · U6 Kochstraße'
    },
    {
      name: 'Mauerpark',
      type: 'memorial',
      lat: 52.5416, lng: 13.4021,
      note: 'The park occupies the former death strip between Prenzlauer Berg and Wedding. A short original Wall section marks the northern end. Best known today for its Sunday flea market — but the park exists because of the Wall.',
      addr: 'Bernauer Straße 63, Prenzlauer Berg · U2 Eberswalder Str.'
    },
    {
      name: 'Potsdamer Platz',
      type: 'memorial',
      lat: 52.5097, lng: 13.3762,
      note: 'Once Europe\'s busiest intersection, cut in half by the Wall for 28 years. A few short Wall sections still stand between the modern buildings. Look for the double cobblestone line in the pavement marking the exact route.',
      addr: 'Potsdamer Platz, Mitte · S1/S2/U2 Potsdamer Platz'
    },
    {
      name: 'Tränenpalast (Palace of Tears)',
      type: 'memorial',
      lat: 52.5201, lng: 13.3866,
      note: 'The former East German border pavilion at Friedrichstraße station — where families said goodbye, sometimes permanently. Now a free federal museum documenting divided Germany and the personal stories of those who crossed here.',
      addr: 'Reichstagufer 17, Mitte · S/U Friedrichstraße · Tue–Fri 9–19, Sat–Sun 10–18'
    },
    {
      name: 'Günter Litfin Memorial',
      type: 'memorial',
      lat: 52.5246, lng: 13.3783,
      note: 'A small memorial at the Charité harbour marking where Günter Litfin was shot on August 24, 1961 — the first person killed trying to cross the Wall. A watchtower nearby is open on weekends as a free memorial.',
      addr: 'Near Invalidenstraße/Charité, Mitte · S Hauptbahnhof'
    }
  ];

  var mapEl = document.getElementById('bw-wall-map-canvas');

  var map = L.map(mapEl, {
    center: [52.515, 13.388],
    zoom: 12,
    scrollWheelZoom: false,
    tap: true
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18
  }).addTo(map);

  map.once('click', function () { map.scrollWheelZoom.enable(); });

  var typeLabels = {
    section: 'Original Wall section',
    memorial: 'Memorial / crossing point'
  };

  var typeIcons = { section: '▪', memorial: '●' };

  function createMarkerIcon(type) {
    var html = '<div class="bw-marker ' + type + '">' + typeIcons[type] + '</div>';
    return L.divIcon({
      className: 'bw-marker-wrap',
      html: html,
      iconSize: [30, 30],
      iconAnchor: [15, 15],
      popupAnchor: [0, -18]
    });
  }

  function createPopup(site) {
    return '<div class="bw-popup-head ' + site.type + '">' +
      '<span class="bw-popup-label">' + typeLabels[site.type] + '</span>' +
      '<div class="bw-popup-name">' + site.name + '</div>' +
      '</div>' +
      '<div class="bw-popup-body">' +
      site.note +
      '<div class="bw-popup-addr">' + site.addr + '</div>' +
      '</div>';
  }

  sites.forEach(function (site) {
    L.marker([site.lat, site.lng], {
      icon: createMarkerIcon(site.type)
    }).bindPopup(createPopup(site), {
      closeButton: true,
      maxWidth: 270
    }).addTo(map);
  });

  setTimeout(function () { map.invalidateSize(); }, 200);
})();
</script>
</body>
</html>
