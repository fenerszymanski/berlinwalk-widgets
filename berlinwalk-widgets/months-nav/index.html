<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visiting Another Month? | BerlinWalk</title>
  <link rel="stylesheet" href="../css/brand.css">
  <script defer src="../js/brand.js"></script>
  <style>
    #bw-months-nav {
      box-sizing: border-box;
      font-family: Montserrat, Arial, sans-serif;
      color: var(--bw-text);
      max-width: 960px;
      margin: 28px auto;
      position: relative;
      padding: 0 4px 22px;
    }
    #bw-months-nav *, #bw-months-nav *::before, #bw-months-nav *::after {
      box-sizing: border-box;
    }
    .mn-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--bw-green);
      margin: 0 0 4px;
      line-height: 1.2;
    }
    .mn-sub {
      font-size: 13px;
      color: var(--bw-muted);
      margin: 0 0 18px;
      font-weight: 500;
    }
    .mn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .mn-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 16px;
      border-radius: 8px;
      background: var(--bw-white);
      border: 1px solid #E0E0E0;
      min-height: 100px;
      text-decoration: none;
      color: inherit;
      transition: transform 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
    }
    a.mn-card:hover {
      transform: translateY(-2px);
      border-color: var(--bw-lime);
      box-shadow: 0 6px 14px rgba(0,0,0,0.06);
      cursor: pointer;
    }
    .mn-card .mn-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--bw-green);
      line-height: 1.2;
    }
    .mn-card .mn-tag {
      font-size: 13px;
      color: #5A7C5F;
      font-weight: 400;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .mn-card .mn-pill {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .mn-card.current {
      background: var(--bw-yellow);
      border-color: var(--bw-yellow);
    }
    .mn-card.current .mn-name { color: var(--bw-green); }
    .mn-card.current .mn-tag { color: #2A4A2D; }
    .mn-card.current .mn-pill {
      background: var(--bw-green);
      color: var(--bw-yellow);
      top: 10px;
      bottom: auto;
    }
    .mn-card.coming_soon {
      background: #F5F5F5;
      opacity: 0.55;
      cursor: default;
    }
    .mn-card.coming_soon .mn-pill {
      background: #E0E0E0;
      color: #6F6F6F;
    }
    .mn-watermark {
      position: absolute;
      right: 8px;
      bottom: 0;
      font-size: 10px;
      font-weight: 600;
      color: var(--bw-green);
      opacity: 0.7;
      letter-spacing: 0.4px;
      pointer-events: none;
    }
    .mn-empty {
      padding: 22px;
      text-align: center;
      color: var(--bw-muted);
      font-size: 14px;
    }
    @media (max-width: 768px) {
      .mn-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 380px) {
      .mn-card { padding: 14px; min-height: 92px; }
      .mn-card .mn-name { font-size: 16px; }
      .mn-card .mn-tag { font-size: 12px; }
    }
  </style>
</head>
<body>
<div id="bw-months-nav" aria-live="polite">
  <div class="mn-empty">Loading…</div>
</div>

<script>
(function () {
  var root = document.getElementById('bw-months-nav');
  var params = new URLSearchParams(window.location.search);
  var currentKey = (params.get('current') || '').toLowerCase();

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c];
    });
  }
  function escapeAttr(s) { return escapeHtml(s); }

  function renderEmpty(label) {
    root.innerHTML = '<div class="mn-empty">' + escapeHtml(label) + '</div>';
  }

  function render(cfg) {
    if (!cfg || !Array.isArray(cfg.months) || !cfg.months.length) {
      renderEmpty('Months data unavailable.');
      return;
    }
    var base = cfg.linkBase || 'https://www.berlinwalk.com/post/';
    var cards = cfg.months.map(function (m) {
      var status = (m.key === currentKey) ? 'current' : (m.status || 'coming_soon');
      var pillHtml = '';
      if (status === 'current') {
        pillHtml = '<span class="mn-pill">You are here</span>';
      } else if (status === 'coming_soon') {
        pillHtml = '<span class="mn-pill">Coming soon</span>';
      }

      var inner =
        '<span class="mn-name">' + escapeHtml(m.name) + '</span>' +
        '<span class="mn-tag">' + escapeHtml(m.tagline) + '</span>' +
        pillHtml;

      if (status === 'published') {
        return '<a class="mn-card" href="' + escapeAttr(base + m.slug) + '" target="_top" rel="noopener">' + inner + '</a>';
      }
      return '<div class="mn-card ' + status + '">' + inner + '</div>';
    }).join('');

    root.innerHTML =
      '<h2 class="mn-title">Visiting Another Month?</h2>' +
      '<p class="mn-sub">Local guides for every month of the year</p>' +
      '<div class="mn-grid">' + cards + '</div>' +
      '<div class="mn-watermark" aria-hidden="true">@berlinwalkingtour</div>';
  }

  fetch('./data.json', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('404'); return r.json(); })
    .then(render)
    .catch(function () { renderEmpty('Months data unavailable.'); });
})();
</script>
</body>
</html>
