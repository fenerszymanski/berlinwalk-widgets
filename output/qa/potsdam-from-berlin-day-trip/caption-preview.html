  <title>Potsdam day trip caption QA</title>
  <style>
    body{margin:0;background:#fafaf5;color:#212121;font-family:Montserrat,Arial,sans-serif;}
    main{max-width:920px;margin:0 auto;padding:24px 16px;}
    h1{font-size:22px;line-height:1.15;margin:0 0 18px;color:#1B5E20;}
    figure{margin:0 0 22px;padding:0;background:#fff;border:1px solid #d9e7c8;border-radius:8px;overflow:hidden;}
    img{display:block;width:100%;height:auto;}
    figcaption{font-size:12px;line-height:1.45;font-style:italic;text-align:center;color:#536153;padding:8px 12px 10px;background:#fff;}
  </style>
</head>
<body>
  <main>
    <h1>Caption QA Preview</h1>
    <figure>
      <img src="/Users/yusufucuz/Documents/New project/berlinwalk-widgets/blog-drafts/images/potsdam-from-berlin-day-trip/assets/optimized/01-potsdam-from-berlin-sanssouci-cover.jpg" alt="Sanssouci Palace and its vineyard terraces in Potsdam">
      <figcaption>Sanssouci is the natural anchor for a first Potsdam day trip, but the park is bigger than it looks on a phone map.</figcaption>
    </figure>
    <figure>
      <img src="/Users/yusufucuz/Documents/New project/berlinwalk-widgets/blog-drafts/images/potsdam-from-berlin-day-trip/assets/optimized/02-sanssouci-park-terraces.jpg" alt="Formal gardens and terraces in Sanssouci Park">
      <figcaption>The park is not filler around the palace. It is the part of Potsdam where many visitors finally slow down.</figcaption>
    </figure>
    <figure>
      <img src="/Users/yusufucuz/Documents/New project/berlinwalk-widgets/blog-drafts/images/potsdam-from-berlin-day-trip/assets/optimized/03-new-palace-sanssouci-park.jpg" alt="The New Palace at the western end of Sanssouci Park">
      <figcaption>The New Palace is impressive, but adding it turns the day into a longer park route.</figcaption>
    </figure>
    <figure>
      <img src="/Users/yusufucuz/Documents/New project/berlinwalk-widgets/blog-drafts/images/potsdam-from-berlin-day-trip/assets/optimized/05-cecilienhof-palace-potsdam.jpg" alt="Cecilienhof Palace in Potsdam's New Garden">
      <figcaption>Cecilienhof is historically important, but the official closure notice means you should check before planning an interior visit.</figcaption>
    </figure>
    <figure>
      <img src="/Users/yusufucuz/Documents/New project/berlinwalk-widgets/blog-drafts/images/potsdam-from-berlin-day-trip/assets/optimized/06-glienicke-bridge-potsdam.jpg" alt="Glienicke Bridge between Potsdam and Berlin">
      <figcaption>Glienicke Bridge is best for visitors who want Cold War context, not just palace photos.</figcaption>
    </figure>
    <figure>
      <img src="/Users/yusufucuz/Documents/New project/berlinwalk-widgets/blog-drafts/images/potsdam-from-berlin-day-trip/assets/optimized/04-dutch-quarter-potsdam.jpg" alt="Brick houses in Potsdam's Dutch Quarter">
      <figcaption>The Dutch Quarter is the easiest place to slow the day down after Sanssouci Park.</figcaption>
    </figure>
  </main>
