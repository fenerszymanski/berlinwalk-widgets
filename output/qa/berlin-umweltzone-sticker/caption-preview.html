</style></head><body><main class="wrap"><h1>Caption QA preview</h1><figure class="fig"><img src="file:///Users/yusufucuz/Documents/New project/berlinwalk-widgets/_worktrees/berlinwalk-widgets-daily-20260706/blog-drafts/images/berlin-umweltzone-sticker/assets/optimized/01-umweltzone-berlin-sign.jpg" alt="Umweltzone traffic sign marking the low-emission zone in Berlin"><figcaption class="cap">The Umweltzone sign is easy to miss when you are focused on finding the hotel or car park.</figcaption></figure><figure class="fig"><img src="file:///Users/yusufucuz/Documents/New project/berlinwalk-widgets/_worktrees/berlinwalk-widgets-daily-20260706/blog-drafts/images/berlin-umweltzone-sticker/assets/optimized/02-berlin-inner-ring-map.jpg" alt="Map of Berlin's inner city bounded by the S-Bahn Ring"><figcaption class="cap">The driving Umweltzone roughly follows the inner S-Bahn Ring, which is different from public transport fare zones.</figcaption></figure><figure class="fig"><img src="file:///Users/yusufucuz/Documents/New project/berlinwalk-widgets/_worktrees/berlinwalk-widgets-daily-20260706/blog-drafts/images/berlin-umweltzone-sticker/assets/optimized/03-green-emissions-sticker.jpg" alt="Green German emissions sticker displayed inside a car windscreen"><figcaption class="cap">The green sticker is tied to the registration number, so it is not a generic souvenir sticker you can swap between cars.</figcaption></figure><figure class="fig"><img src="file:///Users/yusufucuz/Documents/New project/berlinwalk-widgets/_worktrees/berlinwalk-widgets-daily-20260706/blog-drafts/images/berlin-umweltzone-sticker/assets/optimized/04-lichtenrade-park-and-ride.jpg" alt="Cars parked beside Berlin S-Bahnhof Lichtenrade"><figcaption class="cap">If the sticker question is not solved, parking outside the inner city and switching to rail is often the calmer move.</figcaption></figure><figure class="fig"><img src="file:///Users/yusufucuz/Documents/New project/berlinwalk-widgets/_worktrees/berlinwalk-widgets-daily-20260706/blog-drafts/images/berlin-umweltzone-sticker/assets/optimized/06-berlin-mitte-behrenstrasse.jpg" alt="Central Berlin street in Mitte with cars, tram wires and traffic signs"><figcaption class="cap">Mitte is easy on foot but not where I would solve paperwork, parking and luggage at the same time.</figcaption></figure></main></body></html>
